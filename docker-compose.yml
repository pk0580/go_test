services:
  web:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
      - ./app-laravel:/var/www/html
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    volumes:
      - ./app-laravel:/var/www/html
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      REDIS_HOST: redis

  go-sender:
    build:
      context: .
      dockerfile: .docker/go/Dockerfile
    depends_on:
      - redis
      - db
    environment:
      REDIS_ADDR: redis:6379
      DB_DSN: postgres://user:password@db:5432/go_test?sslmode=disable

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: go_test
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
