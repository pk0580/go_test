services:
  web:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
      - ./app-laravel:/var/www/html
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    volumes:
      - ./app-laravel:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      REDIS_HOST: redis

  go-sender:
    build:
      context: .
      dockerfile: .docker/go/Dockerfile
    depends_on:
      - redis
      - db
    environment:
      REDIS_ADDR: redis:6379
      DB_DSN: user:password@tcp(db:3306)/go_test?charset=utf8mb4&parseTime=True&loc=Local
      WORKER_COUNT: 10

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: go_test
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin:latest
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      - db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
